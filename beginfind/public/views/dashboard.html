<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-label">Всего статей</div>
        <div class="stat-value" id="total-articles">0</div>
        <div class="stat-label">статей</div>
    </div>

    <div class="stat-card">
        <div class="stat-label">Всего серверов</div>
        <div class="stat-value" id="total-servers">0</div>
        <div class="stat-label">серверов</div>
    </div>

    <div class="stat-card">
        <div class="stat-label">Всего сообщений</div>
        <div class="stat-value" id="total-messages">0</div>
        <div class="stat-label">сообщений</div>
    </div>

    <div class="stat-card">
        <div class="stat-label">Всего категорий</div>
        <div class="stat-value" id="total-categories">0</div>
        <div class="stat-label">категорий</div>
    </div>
</div>

<!-- Charts container -->
<div class="charts-container">
    <div class="chart-card">
        <h3 class="chart-title">Активность за неделю</h3>
        <canvas id="weeklyActivityChart"></canvas>
    </div>
</div>

<div class="activity-container">
    <h2 class="activity-title">Последняя активность</h2>
    <ul class="activity-list" id="activity-list">
        <li class="activity-item">
            <div class="activity-header">
                <span class="activity-title-text">Система запущена</span>
                <span class="activity-time">Только что</span>
            </div>
            <div class="activity-description">Сервер успешно запущен и работает</div>
        </li>
    </ul>
</div>
