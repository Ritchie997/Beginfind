<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель BeginFind</title>
    <link rel="stylesheet" href="/global-styles.css">
    <link rel="stylesheet" href="/mobile-menu.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Скрываем контент до проверки авторизации */
        .app-container {
            display: none;
        }
        .app-container.loaded,
        #app-container.loaded,
        #main-container.loaded {
            display: block;
        }
        /* Для flex контейнеров нужно display: flex */
        #app-container.loaded.header,
        #main-container.loaded.container {
            display: flex;
        }
        /* Стили для оверлея загрузки */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }
        .auth-overlay.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Оверлей авторизации -->
    <div class="auth-overlay" id="auth-overlay">
        <div style="text-align: center; color: white; font-family: 'Segoe UI', sans-serif;">
            <h2 style="margin-bottom: 20px;">Требуется авторизация</h2>
            <p style="margin-bottom: 30px;">Для доступа к админ-панели необходимо войти в систему</p>
            <button id="login-btn-from-overlay" onclick="showModalLogin()" style="
                background: #5865f2;
                color: white;
                padding: 15px 30px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 16px;
                font-weight: 500;
                transition: background-color 0.2s ease;
            ">Войти в систему</button>
        </div>
    </div>

    <div class="header app-container" id="app-container">
        <button class="hamburger-menu" id="hamburger-menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="logo">BeginFind Admin</div>
        <div class="user-info" id="user-info">
            <div class="user-avatar" id="user-avatar">А</div>
            <div class="username-display" id="username-display">Пользователь</div>
            <div class="dropdown" id="user-dropdown">
                <div class="dropdown-item" id="logout-btn">Выход</div>
            </div>
        </div>
    </div>
    
    <!-- Оверлей для затемнения фона при открытом меню -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="container app-container" id="main-container">
        <div class="sidebar">
            <div class="sidebar-item" data-nav="/dashboard">
                <i>📊</i>
                <span>Дашборд</span>
            </div>
            <div class="sidebar-item" data-nav="/articles">
                <i>📝</i>
                <span>Статьи</span>
            </div>
            <div class="sidebar-item" data-nav="/categories">
                <i>📂</i>
                <span>Категории</span>
            </div>
            <div class="sidebar-item" data-nav="/servers">
                <i>🌐</i>
                <span>Серверы</span>
            </div>
            <div class="sidebar-item" data-nav="/settings">
                <i>⚙️</i>
                <span>Настройки</span>
            </div>
        </div>

        <div class="main-content">
            <div class="content-header">
                <h1 id="page-title">Загрузка...</h1>
            </div>
            <div id="app-content" class="content-body">
                <!-- Content will be loaded here by the router -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/auth-system.js"></script>
    <script src="/app.js"></script>
    <script src="/spa-router.js"></script>
    <script src="/sidebar-manager.js"></script>
    <script src="/editor-manager.js"></script>
</body>
</html>
