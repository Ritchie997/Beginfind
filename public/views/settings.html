<div class="settings-container">
    <h2 class="settings-title">Настройки системы</h2>

    <fieldset class="fieldset-group">
        <legend>Общие настройки</legend>
        <div class="setting-description">Основные параметры работы системы</div>

        <div class="form-group">
            <label class="form-label">Название системы</label>
            <input type="text" id="systemName" class="form-input" value="BeginFind Admin Panel">
        </div>

        <div class="form-group">
            <label class="form-label">Описание системы</label>
            <textarea id="systemDescription" class="form-textarea">Административная панель управления системой BeginFind</textarea>
        </div>
    </fieldset>

    <fieldset class="fieldset-group">
        <legend>Настройки безопасности</legend>
        <div class="setting-description">Параметры безопасности и доступа</div>

        <div class="form-group">
            <label class="form-label">Максимальный размер загружаемого файла (МБ)</label>
            <input type="number" id="maxFileSize" class="form-input" value="5">
        </div>

        <div class="form-group">
            <label class="form-label">Разрешить регистрацию новых пользователей</label>
            <label class="switch">
                <input type="checkbox" id="allowRegistration" checked>
                <span class="slider"></span>
            </label>
        </div>
    </fieldset>

    <fieldset class="fieldset-group">
        <legend>Настройки отображения</legend>
        <div class="setting-description">Параметры интерфейса и отображения</div>

        <div class="form-group">
            <label class="form-label">Количество статей на странице</label>
            <select id="articlesPerPage" class="form-select">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Тема интерфейса</label>
            <select id="theme" class="form-select">
                <option value="dark" selected>Темная (Discord-like)</option>
                <option value="light">Светлая</option>
            </select>
        </div>
    </fieldset>

    <div class="button-group">
        <button class="btn btn-primary" id="save-settings-btn">Сохранить настройки</button>
        <button class="btn btn-secondary" id="reset-settings-btn">Сбросить настройки</button>
    </div>
</div>
