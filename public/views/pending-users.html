<div class="pending-users-page">
    <div style="margin-bottom: 24px;">
        <h2 style="color: var(--header-primary, #fff); margin-bottom: 8px;">Заявки на доступ</h2>
        <p style="color: var(--text-muted, #b9bbbe); margin: 0;">Управление заявками новых пользователей</p>
    </div>

    <!-- Статистика -->
    <div id="pending-stats" style="display: none; margin-bottom: 24px; padding: 16px; background: var(--background-secondary, #2f3136); border-radius: 8px; border: 1px solid var(--background-accent, #4f545c);">
        <div style="display: flex; gap: 16px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 120px;">
                <div style="font-size: 28px; font-weight: 700; color: #f59e0b;" id="pending-count">0</div>
                <div style="color: var(--text-muted, #b9bbbe); font-size: 13px;">Ожидают подтверждения</div>
            </div>
        </div>
    </div>

    <!-- Таблица заявок -->
    <div id="pending-table-container">
        <div id="pending-loading" style="text-align: center; padding: 40px; color: var(--text-muted, #b9bbbe);">
            <div class="skeleton" style="height: 200px;"></div>
        </div>
        <div id="pending-empty" style="display: none; text-align: center; padding: 40px; color: var(--text-muted, #b9bbbe);">
            <div style="font-size: 48px; margin-bottom: 12px;">✅</div>
            <h3 style="color: var(--header-primary, #fff); margin-bottom: 8px;">Нет ожидающих заявок</h3>
            <p>Все заявки обработаны</p>
        </div>
        <div id="pending-table" style="display: none; overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="border-bottom: 2px solid var(--background-accent, #4f545c);">
                        <th style="text-align: left; padding: 12px; color: var(--text-muted, #b9bbbe); font-size: 12px; text-transform: uppercase;">Имя</th>
                        <th style="text-align: left; padding: 12px; color: var(--text-muted, #b9bbbe); font-size: 12px; text-transform: uppercase;">Логин</th>
                        <th style="text-align: left; padding: 12px; color: var(--text-muted, #b9bbbe); font-size: 12px; text-transform: uppercase;">Дата заявки</th>
                        <th style="text-align: right; padding: 12px; color: var(--text-muted, #b9bbbe); font-size: 12px; text-transform: uppercase;">Действия</th>
                    </tr>
                </thead>
                <tbody id="pending-tbody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Модальное окно подтверждения -->
<div id="approve-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10001; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
    <div style="background: var(--background-secondary, #2f3136); padding: 28px; border-radius: 8px; width: 90%; max-width: 400px; border: 1px solid var(--background-accent, #4f545c);">
        <h3 style="color: var(--header-primary, #fff); margin: 0 0 12px 0;">Подтвердить заявку?</h3>
        <p style="color: var(--text-muted, #b9bbbe); margin-bottom: 20px;" id="approve-modal-text">Пользователь получит полный доступ к админ-панели.</p>
        <div style="display: flex; gap: 12px;">
            <button id="approve-confirm-btn" style="flex: 1; background: #28a745; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500;">Подтвердить</button>
            <button id="approve-cancel-btn" style="flex: 1; background: var(--background-accent, #4f545c); color: var(--text-normal, #dcddde); padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">Отмена</button>
        </div>
    </div>
</div>

<!-- Модальное окно отклонения -->
<div id="reject-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10001; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
    <div style="background: var(--background-secondary, #2f3136); padding: 28px; border-radius: 8px; width: 90%; max-width: 400px; border: 1px solid var(--background-accent, #4f545c);">
        <h3 style="color: var(--header-primary, #fff); margin: 0 0 12px 0;">Отклонить заявку?</h3>
        <p style="color: var(--text-muted, #b9bbbe); margin-bottom: 8px;">Причина отклонения (необязательно):</p>
        <input type="text" id="reject-reason" placeholder="Нарушение правил, спам и т.д." style="
            width: 100%; padding: 10px; box-sizing: border-box; margin-bottom: 16px;
            background: var(--background-tertiary, #36393f); border: 1px solid var(--background-accent, #4f545c);
            border-radius: 4px; color: var(--text-normal, #dcddde); font-size: 14px;
        ">
        <div style="display: flex; gap: 12px;">
            <button id="reject-confirm-btn" style="flex: 1; background: #dc3545; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500;">Отклонить</button>
            <button id="reject-cancel-btn" style="flex: 1; background: var(--background-accent, #4f545c); color: var(--text-normal, #dcddde); padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">Отмена</button>
        </div>
    </div>
</div>

<!-- Toast уведомления -->
<div id="pending-toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 10002;"></div>
